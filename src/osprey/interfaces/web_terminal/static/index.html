<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSPREY Web Terminal</title>

  <!-- FOUC prevention: set data-theme before any CSS loads -->
  <script>
    (function() {
      var t = localStorage.getItem('osprey-theme');
      if (t !== 'dark' && t !== 'light') t = 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Fonts (self-hosted, no external CDN) -->
  <link rel="stylesheet" href="/static/fonts/fonts.css">

  <!-- xterm.js (CDN by default; local in OSPREY_OFFLINE mode) -->
  <link rel="stylesheet" href="{{ vendor_url('xterm.css', '/static/vendor/xterm.min.css') }}">
  <script src="{{ vendor_url('xterm.js', '/static/vendor/xterm.min.js') }}"></script>
  <script src="{{ vendor_url('xterm addon-fit', '/static/vendor/addon-fit.min.js') }}"></script>
  <script src="{{ vendor_url('xterm addon-web-links', '/static/vendor/addon-web-links.min.js') }}"></script>

  <!-- highlight.js -->
  <link id="hljs-theme" rel="stylesheet" href="{{ vendor_url('highlight.js atom-one-dark theme', '/static/vendor/atom-one-dark.min.css') }}">
  <link rel="prefetch" href="{{ vendor_url('highlight.js atom-one-light theme', '/static/vendor/atom-one-light.min.css') }}">
  <script src="{{ vendor_url('highlight.js', '/static/vendor/highlight.min.js') }}"></script>

  <!-- marked.js -->
  <script src="{{ vendor_url('marked', '/static/vendor/marked.min.js') }}"></script>

  <!-- OSPREY styles -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/terminal.css">
  <link rel="stylesheet" href="/static/css/files.css">
  <link rel="stylesheet" href="/static/css/operator.css">
  <link rel="stylesheet" href="/static/css/md-rendered.css">
  <link rel="stylesheet" href="/static/css/drawer.css">
  <link rel="stylesheet" href="/static/css/sessions.css">
  <link rel="stylesheet" href="/static/css/settings.css">
  <link rel="stylesheet" href="/static/css/scaffold.css">
  <link rel="stylesheet" href="/static/css/theme-light.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-logo">OSPREY</span>
      <span class="header-title">Web Terminal</span>
    </div>
    <div class="header-right">
      <div class="header-tabs" id="header-tabs">
        <!-- Populated by panel-manager.js -->
      </div>
      <div class="header-actions">
        <a class="header-icon-btn" id="docs-link" href="https://als-apg.github.io/osprey/" title="Documentation" target="_blank" rel="noopener">&#128214;</a>
        <button class="header-icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Switch to light theme">
          <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="header-icon-btn" data-drawer="settings-drawer" title="Settings">&#9881;</button>
      </div>
    </div>
  </header>

  <!-- Main Split Pane -->
  <div class="main-container">

    <!-- Terminal Panel (Left) -->
    <div class="terminal-panel">
      <div class="terminal-header">
        <span class="session-led" id="session-led"></span>
        <span class="terminal-label" id="terminal-label">Session</span>
        <div class="session-selector" id="session-selector"></div>
        <button class="new-session-btn" id="new-session-btn" title="New Session">+ New</button>
      </div>
      <div class="terminal-body" id="terminal-body">
        <div id="terminal-container"></div>
        <div id="operator-container" class="operator-container"></div>
        <div class="terminal-bezel"></div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div class="resize-handle" id="resize-handle">
      <div class="resize-handle-grip"></div>
    </div>

    <!-- Right Panel — Tabbed service panes -->
    <div class="files-panel" id="right-panel">
      <div class="panel-content" id="panel-content">
        <!-- Active tab's iframe or empty state -->
      </div>
    </div>

  </div>

  <!-- Status Bar -->
  <footer class="status-bar">
    <div class="status-left">
      <div class="status-item">
        <span class="status-dot" id="ws-dot"></span>
        <span>WS</span>
      </div>
      <div class="status-item" id="operator-status" style="display: none;">
        <span class="status-dot" id="operator-dot"></span><span>OP</span>
      </div>
      <div class="status-item" id="ariel-status" style="display: none;">
        <span class="status-dot" id="ariel-dot"></span><span>ARIEL</span>
      </div>
      <div class="status-item" id="tuning-status" style="display: none;">
        <span class="status-dot"></span><span>TUNING</span>
      </div>
      <div class="status-item" id="term-dims">--x--</div>
    </div>
    <div class="status-right">
      <div class="status-item" id="status-clock">--:--:--</div>
    </div>
  </footer>

  <!-- Drawer Backdrop -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>

  <!-- Unified Settings Drawer -->
  <div class="drawer" id="settings-drawer">
    <div class="drawer-resize-handle"></div>
    <div class="drawer-header">
      <div class="drawer-header-left">
        <span class="drawer-icon">&#9881;</span>
        <span class="drawer-title">Settings</span>
      </div>
      <div class="drawer-tabs">
        <button class="drawer-tab active" data-tab="tab-behavior">Behavior</button>
        <button class="drawer-tab" data-tab="tab-safety">Safety</button>
        <button class="drawer-tab" data-tab="tab-memory">Memory</button>
        <button class="drawer-tab" data-tab="tab-config">Config</button>
      </div>
      <button class="drawer-close-btn">&times;</button>
    </div>

    <!-- Behavior Tab (gallery, populated by JS) -->
    <div class="drawer-tab-panel active" id="tab-behavior"></div>

    <!-- Safety Tab (toggle bar + gallery + log viewer) -->
    <div class="drawer-tab-panel" id="tab-safety">
      <div id="hook-debug-bar"></div>
      <div id="safety-gallery-section"></div>
      <div id="hook-debug-log-section"></div>
    </div>

    <!-- Memory Tab (Claude Code native memory gallery) -->
    <div class="drawer-tab-panel" id="tab-memory">
      <!-- Populated by memory-gallery.js -->
    </div>

    <!-- Config Tab (mini gallery + YAML form) -->
    <div class="drawer-tab-panel" id="tab-config">
      <div id="config-gallery-section"></div>
      <div id="config-form-section">
        <div class="settings-mode-bar">
          <button class="settings-mode-btn active" data-mode="form">Form</button>
          <button class="settings-mode-btn" data-mode="raw">Raw YAML</button>
        </div>
        <div class="drawer-body" style="position: relative;">
          <div id="settings-loading" class="settings-loading" style="display: none;">Loading config...</div>
          <div id="settings-error" class="settings-error" style="display: none;"></div>
          <div id="settings-form-view">
            <div id="settings-form" class="settings-form"></div>
          </div>
          <div id="settings-raw-view" class="settings-raw">
            <textarea id="settings-raw-editor" spellcheck="false"></textarea>
          </div>
          <!-- Confirmation dialog overlay -->
          <div class="settings-confirm-overlay">
            <div class="settings-confirm-dialog">
              <div class="settings-confirm-title">Apply Settings?</div>
              <div class="settings-confirm-message">Applying settings will restart the terminal session. Any running processes will be terminated.</div>
              <div class="settings-confirm-actions">
                <button class="settings-cancel-btn">Cancel</button>
                <button class="settings-confirm-btn">Apply &amp; Restart</button>
              </div>
            </div>
          </div>
        </div>
        <div class="settings-save-bar">
          <span class="settings-status"></span>
          <button class="settings-apply-btn">Apply Settings</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Welcome Modal (first visit only) -->
  <div class="welcome-overlay" id="welcome-overlay">
    <div class="welcome-terminal">
      <pre class="welcome-ascii" id="welcome-ascii" aria-hidden="true"></pre>
      <a class="welcome-safety-link" id="welcome-safety-link" style="visibility:hidden"
         href="/static/safety.html" target="_blank" rel="noopener">Read the safety guidelines</a>
      <button class="welcome-prompt" id="welcome-dismiss" style="visibility:hidden">
        <span class="welcome-cursor"></span> Press ENTER to continue
      </button>
    </div>
  </div>

  <!-- App entry point -->
  <script type="module" src="/static/js/app.js"></script>

</body>
</html>
