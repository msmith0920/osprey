# Pre-commit hooks for Osprey Framework
# See https://pre-commit.com for more information
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format

  # General file quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Remove trailing whitespace
      - id: trailing-whitespace
        # Vendored minified JS bundles (plotly) and generated channel-database
        # tier artifacts are produced by external tooling — formatting them
        # creates spurious diffs on the next re-vendor / regeneration.
        exclude: |
          (?x)^(
            .*\.min\.(js|css)|
            src/osprey/templates/apps/control_assistant/data/channel_databases/tiers/.*\.json
          )$
      # Ensure files end with a newline
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
            .*\.min\.(js|css)|
            src/osprey/templates/apps/control_assistant/data/channel_databases/tiers/.*\.json
          )$
      # Check for merge conflict markers
      - id: check-merge-conflict
      # Check YAML syntax
      - id: check-yaml
        # Skill scaffolds contain Jinja-templated YAML (`${var}`, `# IF/FOR`)
        # that's rendered at install time and isn't valid standalone YAML.
        exclude: ^src/osprey/templates/skills/osprey-build-deploy/templates/core/
      # Check TOML syntax
      - id: check-toml
      # Prevent large files from being committed
      - id: check-added-large-files
        args: ['--maxkb=1000']
      # Check for files that would conflict on case-insensitive filesystems
      - id: check-case-conflict
      # Detect private keys
      - id: detect-private-key
      # Check JSON syntax
      - id: check-json
      # Check for debugger imports
      - id: debug-statements

# pre-commit.ci configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: monthly
  submodules: false
