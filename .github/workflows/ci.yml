name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Nightly at 07:00 UTC (midnight Pacific). Tier 4 (provider matrix,
    # benchmarks) gates on github.event_name == 'schedule'.
    - cron: '0 7 * * *'

# Note: This workflow runs tests, linting, docs build, and package checks
# For documentation deployment to GitHub Pages, see .github/workflows/docs.yml

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run unit tests
      run: |
        uv run pytest tests/ --ignore=tests/e2e -v --tb=short --cov=src/osprey --cov-report=xml --cov-report=term

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run ruff (linting)
      run: |
        uv run ruff check src/ tests/ --output-format=github

    - name: Run ruff (formatting)
      run: |
        uv run ruff format --check src/ tests/

    - name: Run mypy (type checking)
      run: |
        uv run mypy src/ --no-error-summary || true
      continue-on-error: true

  docs:
    name: Documentation Build (Check Only)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra docs

    - name: Build documentation
      run: |
        cd docs
        uv run make html

    - name: Check for broken links
      run: |
        cd docs
        uv run make linkcheck || true
      continue-on-error: true

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v6
      if: github.event_name == 'pull_request'
      with:
        name: documentation-preview
        path: docs/build/html
        retention-days: 7

  package:
    name: Package Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Build package
      run: uv build

    - name: Check package
      run: uvx twine check dist/*

    - name: Upload package artifacts
      uses: actions/upload-artifact@v6
      with:
        name: package
        path: dist/
        retention-days: 7

  static-checks:
    name: Tier 0 — Static (preset YAML, skill ↔ MCP-tool consistency)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Tier 0 static checks
      run: uv run pytest tests/integration/test_preset_static.py -v --tb=short

  build-boot-smoke:
    name: Tier 1 — Build + MCP boot (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Cache uv project-venv downloads
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uv-buildboot-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-buildboot-${{ runner.os }}-

    - name: Run Tier 1 boot smoke for preset
      env:
        PRESET: ${{ matrix.preset }}
      run: |
        uv run pytest tests/integration/test_build_boot.py -v --tb=short -k "$PRESET"

  agentic-per-preset:
    name: Tier 3 — Agentic flow (${{ matrix.preset }}) [advisory]
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (ALS_APG_API_KEY unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Defense in depth: surface "secret unset" or "GitHub Actions IP not
        # allowlisted" failures clearly here, instead of buried under confusing
        # 4xx errors flooding pytest output 5+ minutes later.
        # See CHANGELOG entry on the cborg → ALS-APG CI swap for full context.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          echo "   (Check repo secrets; required for the agentic-per-preset job.)"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          echo "   Body (first 500 chars):"
          head -c 500 /tmp/probe.txt; echo
          echo "   If 401/403: rotate ALS_APG_API_KEY or check IP allowlist."
          echo "   If 5xx: ALS-APG outage — retry, or contact the proxy admin."
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run Tier 3 agentic test for preset
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
        PRESET: ${{ matrix.preset }}
      run: |
        # template names use snake_case in init_project (e.g. hello_world);
        # the matrix entry is the kebab-case preset id, which appears in the
        # function name (test_hello_world_*) so -k matches both.
        PRESET_K="${PRESET//-/_}"
        uv run pytest tests/e2e/test_preset_agentic.py -v --tb=short -k "$PRESET_K"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run on PRs (not pushes) to control API costs, and only for non-fork PRs (secrets unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Same probe as agentic-per-preset; see comment there for rationale.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          head -c 500 /tmp/probe.txt; echo
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run E2E tests
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Tier 3 per-preset agentic flows live in their own matrix job
        # (agentic-per-preset). Exclude here to avoid double-execution.
        uv run pytest tests/e2e/ -v --tb=short \
          --ignore=tests/e2e/test_preset_agentic.py

  deploy-e2e:
    name: Deploy E2E Test (build + deploy pipeline)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (secrets unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1

    - name: Install osprey
      run: uv sync --extra dev

    - name: Create hello_world project
      run: |
        # CI only has ALS_APG_API_KEY (cborg's IP allowlist excludes GitHub
        # Actions runners). Drive provider selection through `osprey build
        # --set` instead of post-build sed surgery — keeps the contract
        # explicit and survives template re-formatting.
        uv run osprey build hello-world-test --preset hello-world \
          --skip-deps --skip-lifecycle \
          --set provider=als-apg --set model=haiku
        cd hello-world-test
        uv run osprey skills install osprey-build-interview
        ls -la

    - name: osprey deploy up (graceful no-op for hello-world)
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        cd hello-world-test
        # hello-world declares no deployed_services, so deploy up should
        # exit 0 with a "no services configured" notice rather than
        # crashing on TemplateNotFound.
        uv run osprey deploy up -d --dev

    - name: osprey deploy down
      if: always()
      run: |
        cd hello-world-test
        uv run osprey deploy down || true

  all-checks-passed:
    name: All CI Checks Passed
    needs: [test, lint, docs, package, static-checks, build-boot-smoke, e2e-tests, deploy-e2e, agentic-per-preset]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check all jobs status
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "❌ Tests failed"
          exit 1
        fi
        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "❌ Lint checks failed"
          exit 1
        fi
        if [[ "${{ needs.docs.result }}" != "success" ]]; then
          echo "❌ Documentation build failed"
          exit 1
        fi
        if [[ "${{ needs.package.result }}" != "success" ]]; then
          echo "❌ Package build failed"
          exit 1
        fi
        if [[ "${{ needs.static-checks.result }}" != "success" ]]; then
          echo "❌ Tier 0 static checks failed"
          exit 1
        fi
        if [[ "${{ needs.build-boot-smoke.result }}" != "success" ]]; then
          echo "❌ Tier 1 build + boot smoke failed"
          exit 1
        fi
        # Tier 3 agentic-per-preset: advisory (continue-on-error in job)
        if [[ "${{ needs.agentic-per-preset.result }}" == "failure" ]]; then
          echo "⚠️  Agentic per-preset failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.agentic-per-preset.result }}" == "skipped" ]]; then
          echo "⏭️  Agentic per-preset skipped (only run on PRs)"
        else
          echo "✅ Agentic per-preset passed"
        fi
        # E2E tests: advisory (LLM-dependent, may fail due to rate limits)
        if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
          echo "⚠️  E2E tests failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.e2e-tests.result }}" == "skipped" ]]; then
          echo "⏭️  E2E tests skipped (only run on PRs)"
        else
          echo "✅ E2E tests passed"
        fi
        # Deploy E2E: advisory (LLM-dependent, may fail due to rate limits)
        if [[ "${{ needs.deploy-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Deploy E2E test failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.deploy-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Deploy E2E test skipped (only run on PRs)"
        else
          echo "✅ Deploy E2E test passed"
        fi
        echo "✅ All CI checks passed!"
