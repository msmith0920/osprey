# ============================================================================
# OSPREY model-capability e2e matrix — the WHOLE run, declaratively (issue #259)
# ============================================================================
# Driven by scripts/benchmark/matrix.py. Each `models:` row names a `provider`
# and a model `id`; the launcher resolves credentials, derives the route
# (proxy for OpenAI-protocol models, direct for Anthropic-protocol), wires the
# LLM judge, and runs one isolated worker per (model, seed) cell.
#
# Add a model = add a row. Add a provider (deepseek/ollama/unsloth/vllm) = add a
# `providers:` entry + rows that reference it. No script edits.
#
#   scripts/benchmark/matrix.py --dry-run     # see the resolved plan
#   scripts/benchmark/matrix.py               # run it

# --- providers: how to reach each backend + authenticate --------------------
# `protocol` is the provider's NATIVE wire protocol; a per-model `protocol:`
# override wins (CBORG serves claude-* on the Anthropic route, everything else
# on the OpenAI route, under one provider name).
# `judge` declares the grader for this provider's cells: `via` names a provider
# whose base_url + key back the judge (must be a reachable, capable model —
# NEVER the model under test); `model` is a model id valid at that endpoint.
providers:
  cborg:
    base_url: https://api.cborg.lbl.gov/v1
    key_env: CBORG_API_KEY            # falls back to key_file when env unset
    key_file: ~/.cborg_key
    protocol: openai
    judge: { via: cborg, model: google/claude-haiku-4-5 }

  als-apg:
    # Native als-apg endpoint (AWS Bedrock proxy, NO /v1 — the Anthropic SDK
    # appends /v1/messages). Same base_url backs both SUT routing and the judge.
    base_url: https://llm.gianlucamartino.com
    key_env: ALS_APG_API_KEY
    key_file: ~/.als_apg_key
    protocol: anthropic
    judge: { via: als-apg, model: claude-haiku-4-5-20251001 }

  # DwarfStar (ds4) — local DeepSeek V4 on the benchmark box (PR #252).
  # Keyless OpenAI-compatible server → routed through the translation proxy.
  # The model under test is local; its judge MUST stay remote (via: cborg).
  # ONE shared server runs for the whole machine (153 GB resident, instance
  # lock) as the _ds4 launchd daemon — do NOT start your own ds4-server, it will
  # collide. Just point at the localhost endpoint below; any/empty key works.
  # Health check:  curl http://127.0.0.1:8000/v1/models   (see
  # /Users/Shared/ds4-setup-for-thellert.md on the Studio). Context is 32768.
  ds4:
    base_url: http://127.0.0.1:8000/v1
    keyless: true
    protocol: openai
    judge: { via: cborg, model: google/claude-haiku-4-5 }

# --- defaults applied to every model row unless overridden ------------------
defaults:
  seeds: 3            # subjects run 3 seeds; references override to 1
  budget_scale: 1     # price normalizer; only pricey hosted refs raise it
  timeout_s: 1800     # per-test hang-breaker (scored inconclusive, not failed)

# --- the grid ---------------------------------------------------------------
models:
  # ---- subjects: open models on CBORG, 3 seeds, OpenAI-protocol (proxy) -----
  - { id: gpt-oss-20b,         provider: cborg }
  - { id: gpt-oss-120b,        provider: cborg }
  - { id: gemma-4,             provider: cborg }
  - { id: cborg-coder,         provider: cborg }
  - { id: google/qwen-3-coder, provider: cborg }
  - { id: google/qwen-3,       provider: cborg }

  # ---- references: Anthropic ceiling bracket via als-apg, 1 seed, direct ----
  # budget_scale tracks per-token price so the haiku-tuned $ caps don't blow
  # mid-query and deflate the score for a cost reason unrelated to capability.
  - { id: claude-haiku-4-5-20251001, provider: als-apg, seeds: 1 }
  - { id: claude-sonnet-4-6,         provider: als-apg, seeds: 1, budget_scale: 3 }
  - { id: claude-opus-4-6,           provider: als-apg, seeds: 1, budget_scale: 6 }

  # ---- local DeepSeek V4 on the shared ds4 server (keyless localhost) -------
  # Local inference is free (budget_scale stays 1) but slow on the shared GPU —
  # run this lane on its own at `--parallel 1` (matrix_restart.sh launches it as
  # the matrix_ds4 tmux session). The judge stays remote (via: cborg).
  - { id: deepseek-v4-flash, provider: ds4 }
  - { id: deepseek-v4-pro,   provider: ds4 }
