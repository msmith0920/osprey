name: Validate Install Docs

# Builds a wheel from the current SHA, installs it via `uv tool`, and runs
# the bash blocks extracted from installation.rst and osprey-build-interview.rst.
# This catches doc-vs-wheel drift before it reaches a release tag.

on:
  pull_request:
    paths:
      - 'docs/source/getting-started/installation.rst'
      - 'docs/source/getting-started/osprey-build-interview.rst'
      - 'scripts/extract_doc_bash.py'
      - '.github/workflows/validate-install-docs.yml'
      - 'src/osprey/cli/skills_cmd.py'
      - 'src/osprey/templates/skills/**'
  workflow_call: {}

jobs:
  validate:
    name: Run install docs against built wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel from current SHA
        run: uv build

      - name: Install osprey from built wheel (NOT PyPI)
        run: uv tool install ./dist/osprey_framework-*.whl

      - name: Verify osprey on PATH
        run: osprey --version

      - name: Extract and run installation.rst bash blocks
        run: |
          python scripts/extract_doc_bash.py docs/source/getting-started/installation.rst > /tmp/install.sh
          cat /tmp/install.sh
          bash /tmp/install.sh

      - name: Extract and run osprey-build-interview.rst bash blocks
        run: |
          python scripts/extract_doc_bash.py docs/source/getting-started/osprey-build-interview.rst > /tmp/interview.sh
          cat /tmp/interview.sh
          bash /tmp/interview.sh

      - name: Verify osprey-build-interview skill installed
        run: test -f ~/.claude/skills/osprey-build-interview/SKILL.md
